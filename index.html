<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anna — Gyömbér Viktória Asszisztens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <button class="new-chat-btn" id="new-chat-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Új beszélgetés
        </button>
      </div>
      <div class="sidebar__list" id="conversation-list">
        <!-- Conversations loaded dynamically -->
      </div>
      <div class="sidebar__footer">
        <span class="sidebar__brand">Attila: <a href="tel:+3630486564" style="color: var(--text-muted); text-decoration: underline;">06304865645</a></span>
      </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Chat -->
    <main class="app">
      <!-- Header -->
      <header class="header">
        <button class="menu-btn" id="menu-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-icon">A</div>
        <div class="header-info">
          <div class="header-title">Anna</div>
          <div class="header-status">Expert Flow</div>
        </div>
      </header>

      <!-- Messages -->
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome__suggestions">
            <button class="welcome__suggestion">Google Workspace admin</button>
            <button class="welcome__suggestion">Email összekapcsolása</button>
            <button class="welcome__suggestion">Admin hozzáférés adása</button>
            <button class="welcome__suggestion">GitHub és Vercel</button>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="input"
            rows="1"
            placeholder="Írj üzenetet..."
            autocomplete="off"
          ></textarea>
          <button id="send-btn" class="send-btn" disabled>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/chat.js"></script>
</body>
</html>
